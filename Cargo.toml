[package]
name = "ffi-core"
version = "0.1.0"
edition = "2024"

[dependencies]
fast-down = { version = "3.8.1", features = ["sanitize-filename", "serde", "utils"] }
parking_lot = "0.12.5"
serde = "1.0.228"
tokio = "1.49.0"
tokio-util = "0.7.18"
url = "2.5.8"
reqwest = { version = "0.13.2", default-features = false, features = [
  "default-tls",
  "brotli",
  "deflate",
  "gzip",
  "http2",
  "socks",
  "system-proxy",
  "zstd"
] }

[dev-dependencies]
axum = "0.8.8"
tempfile = "3.26.0"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
cargo = { level = "deny", priority = -1 }
# restriction = { level = "deny", priority = -1 }
multiple_crate_versions = "allow"
