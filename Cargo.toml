[package]
name = "ffi-core"
version = "0.1.0"
edition = "2024"

[dependencies]
fast-down = { version = "3.7.7", features = ["sanitize-filename", "serde", "utils"] }
parking_lot = "0.12.5"
serde = "1.0.228"
tokio = "1.49.0"
tokio-util = "0.7.18"
url = "2.5.8"
reqwest = { version = "0.13.2", default-features = false, features = [
  "default-tls",
  "brotli",
  "deflate",
  "gzip",
  "http2",
  "socks",
  "system-proxy",
  "zstd"
] }
